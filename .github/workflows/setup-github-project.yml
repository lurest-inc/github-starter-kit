name: Setup GitHub Project

on:
  workflow_dispatch:
    inputs:
      project_title:
        description: "作成する Project のタイトル"
        required: true
        type: string
      visibility:
        description: "Project の公開範囲"
        required: true
        type: choice
        default: "PRIVATE"
        options:
          - "PRIVATE"
          - "PUBLIC"

permissions:
  contents: read

jobs:
  create-project:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup GitHub Project
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
          PROJECT_OWNER: ${{ github.repository_owner }}
          PROJECT_TITLE: ${{ inputs.project_title }}
          PROJECT_VISIBILITY: ${{ inputs.visibility }}
        run: |
          chmod +x scripts/setup-github-project.sh
          bash scripts/setup-github-project.sh
