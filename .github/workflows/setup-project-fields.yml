name: Setup Project Fields

on:
  workflow_dispatch:
    inputs:
      project_number:
        description: "対象 Project の Number"
        required: true
        type: number
      field_definitions:
        description: "フィールド定義（JSON配列）。空の場合はデフォルトフィールドを使用"
        required: false
        type: string

permissions:
  contents: read

jobs:
  setup-fields:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup Project Fields
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
          PROJECT_OWNER: ${{ github.repository_owner }}
          PROJECT_NUMBER: ${{ inputs.project_number }}
          FIELD_DEFINITIONS: >-
            ${{ inputs.field_definitions != '' && inputs.field_definitions ||
            '[
              {"name":"Priority","dataType":"SINGLE_SELECT","options":["P0","P1","P2","P3"]},
              {"name":"Estimate","dataType":"SINGLE_SELECT","options":["XS","S","M","L","XL"]},
              {"name":"Category","dataType":"SINGLE_SELECT","options":["Bug","Feature","Chore","Spike"]},
              {"name":"Due Date","dataType":"DATE"}
            ]' }}
        run: |
          chmod +x scripts/setup-project-fields.sh
          bash scripts/setup-project-fields.sh
