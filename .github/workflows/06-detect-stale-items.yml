name: "⑥ 滞留アイテム検知"

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:
    inputs:
      project_number:
        description: "Project の Number"
        required: true
        type: number

permissions:
  contents: read

jobs:
  detect-stale-items:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.PROJECT_PAT }}
      PROJECT_OWNER: ${{ github.repository_owner }}
      PROJECT_NUMBER: ${{ inputs.project_number || '1' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: 滞留アイテム検知
        run: |
          chmod +x scripts/detect-stale-items.sh
          bash scripts/detect-stale-items.sh

      - name: アーティファクトをアップロード
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: stale-items-report
          path: stale-items-report.json
          if-no-files-found: ignore
          retention-days: 7

  workflow-summary-failure:
    needs: [detect-stale-items]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: 失敗サマリーを出力
        uses: ./.github/actions/workflow-summary
        with:
          status: failure
          project-owner: ${{ github.repository_owner }}
          project-number: ${{ inputs.project_number || '1' }}
          job-results: |
            {"detect-stale-items": "${{ needs.detect-stale-items.result }}"}

  workflow-summary-success:
    needs: [detect-stale-items]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: 成功サマリーを出力
        uses: ./.github/actions/workflow-summary
        with:
          status: success
          project-owner: ${{ github.repository_owner }}
          project-number: ${{ inputs.project_number || '1' }}
          job-results: |
            {"detect-stale-items": "${{ needs.detect-stale-items.result }}"}
