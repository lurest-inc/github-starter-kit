name: 'Failure Summary'
description: '失敗時の共通サマリー出力'
inputs:
  job-results:
    description: '各ジョブの結果（JSON形式、複数ジョブ時に使用）'
    required: false
    default: ''
runs:
  using: composite
  steps:
    - shell: bash
      env:
        JOB_RESULTS: ${{ inputs.job-results }}
      run: |
        {
          echo "## :x: ワークフロー失敗レポート"
          echo ""
          echo "| 項目 | 値 |"
          echo "|------|-----|"
          echo "| ワークフロー名 | \`${{ github.workflow }}\` |"
          echo "| ジョブ名 | \`${{ github.job }}\` |"
          echo "| ブランチ | \`${{ github.ref_name }}\` |"
          echo "| コミット | \`${GITHUB_SHA::7}\` |"
          echo "| 実行者 | \`${{ github.actor }}\` |"
          echo "| 実行URL | [Actions Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"

          if [[ -n "${JOB_RESULTS}" ]]; then
            echo ""
            echo "### ジョブ結果"
            echo ""
            echo "| ジョブ名 | 結果 |"
            echo "|----------|------|"
            echo "${JOB_RESULTS}" | jq -r 'to_entries[] | "| \(.key) | \(.value) |"'
          fi
        } >> "$GITHUB_STEP_SUMMARY"
